# Calculadora Basica v1 - Docker Compose
# Orchestrates backend and frontend services with healthchecks

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calculadora-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - calculadora-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calculadora-frontend
    ports:
      - "80:80"
    environment:
      - API_BASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - calculadora-network

networks:
  calculadora-network:
    driver: bridge
